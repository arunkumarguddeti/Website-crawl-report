# ─────────────────────────────────────────────────────────────
#  crawl.yml — Generic Ad-Hoc Crawler
#
#  Use this to run a one-off report for ANY URL on demand.
#  - Not triggered by crawl-all.yml
#  - Not scheduled (no cron)
#  - No secrets tied to any specific site
#  - Sends email notification on completion or failure
#  - Has its own concurrency group — never blocked by site1-4
#
#  Just fill in base_url and hit Run workflow.
# ─────────────────────────────────────────────────────────────
name: 🔍 Ad-Hoc Crawler (Any URL)

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'URL to crawl (required) — e.g. https://www.anysite.com'
        required: true
        default: ''

      scan_mode:
        description: 'Scan mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - targeted

      target_pages:
        description: '[TARGETED ONLY] Comma-separated page URLs'
        required: false
        default: ''

      scan_label:
        description: 'Optional label shown in report (e.g. "Client audit")'
        required: false
        default: ''

      max_depth:
        description: 'Max crawl depth'
        required: false
        default: '8'

      max_pages:
        description: 'Max pages to crawl'
        required: false
        default: '3000'

      concurrency:
        description: 'Parallel workers'
        required: false
        default: '10'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: crawl-adhoc-${{ github.ref }}
  cancel-in-progress: false

jobs:
  crawl-adhoc:
    name: Ad-Hoc Crawl — ${{ github.event.inputs.base_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate inputs
        run: |
          if [ -z "${{ github.event.inputs.base_url }}" ]; then
            echo "❌ base_url is required for ad-hoc crawl"
            exit 1
          fi
          MODE="${{ github.event.inputs.scan_mode }}"
          PAGES="${{ github.event.inputs.target_pages }}"
          if [ "$MODE" = "targeted" ] && [ -z "$PAGES" ]; then
            echo "❌ scan_mode is 'targeted' but target_pages is empty"
            exit 1
          fi
          echo "✅ URL: ${{ github.event.inputs.base_url }} | Mode: $MODE"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        env:
          BASE_URL:       ${{ github.event.inputs.base_url }}
          TARGET_PAGES:   ${{ github.event.inputs.target_pages || '' }}
          SCAN_LABEL:     ${{ github.event.inputs.scan_label || '' }}
          MAX_DEPTH:      ${{ github.event.inputs.max_depth || '8' }}
          MAX_PAGES:      ${{ github.event.inputs.max_pages || '3000' }}
          CONCURRENCY:    ${{ github.event.inputs.concurrency || '10' }}
          TIMEOUT:        '10'
          POLITE_DELAY:   '0.3'
          RESPECT_ROBOTS: 'true'
          OUTPUT_DIR:     './reports'
        run: python crawler.py

      - name: Verify reports
        run: |
          ls -lh reports/
          test -f reports/index.html && echo "✅ index.html found" || (echo "❌ Missing" && exit 1)

      - name: Archive report to gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git fetch origin gh-pages 2>/dev/null; then
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            echo "gh-pages does not exist yet — creating it"
            git worktree add --orphan -b gh-pages /tmp/gh-pages
            cd /tmp/gh-pages
            git commit --allow-empty -m "Initialize gh-pages branch"
            git push origin gh-pages
            cd -
          fi
          mkdir -p /tmp/gh-pages/archive/adhoc
          # Only archive HTML to gh-pages (CSV/Excel too large for git)
          for f in reports/*.html; do
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -lt 52428800 ]; then  # skip files >50MB
              cp "$f" /tmp/gh-pages/archive/adhoc/
            else
              echo "Skipping $f — too large (${size} bytes)"
            fi
          done
          find /tmp/gh-pages/archive/adhoc -type f -mtime +30 -delete 2>/dev/null || true
          cd /tmp/gh-pages
          python3 - << 'PYEOF'
          import re
          from pathlib import Path
          files = sorted(Path("archive/adhoc").glob("report_*.html"), reverse=True)
          rows = ""
          for f in files[:50]:
              name = f.name
              m = re.search(r"(\d{4})(\d{2})(\d{2})_(\d{2})(\d{2})(\d{2})", name)
              label = f"{m.group(1)}-{m.group(2)}-{m.group(3)} {m.group(4)}:{m.group(5)}:{m.group(6)} EST" if m else name
              rows += f'<tr><td><a href="adhoc/{name}">{label}</a></td><td>{name}</td></tr>\n'
          html = f"""<!DOCTYPE html><html><head><meta charset="UTF-8">
          <title>Ad-Hoc Archive</title>
          <style>body{{font-family:sans-serif;background:#0f172a;color:#e2e8f0;padding:30px}}
          a{{color:#60a5fa}}table{{width:100%;border-collapse:collapse;margin-top:20px}}
          th,td{{padding:10px 14px;border:1px solid #334155}}th{{background:#1e293b}}
          tr:hover{{background:#1e293b}}</style></head>
          <body><h1>🔍 Ad-Hoc Report Archive</h1>
          <p>{len(files)} reports · auto-deleted after 30 days</p>
          <table><thead><tr><th>Run Date (EST)</th><th>File</th></tr></thead>
          <tbody>{rows}</tbody></table></body></html>"""
          Path("archive/adhoc/index.html").write_text(html)
          PYEOF
          git add -A
          git diff --cached --quiet || git commit -m "Archive adhoc $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: adhoc-${{ github.event.inputs.scan_label || github.run_number }}
          path: |
            reports/*.html
            reports/*.csv
            reports/*.xlsx
          retention-days: 30

      - name: Include archive in Pages deployment
        run: |
          # Pull archive folder from gh-pages branch into reports/ so
          # the full archive is accessible at the GitHub Pages URL
          if git fetch origin gh-pages 2>/dev/null; then
            mkdir -p reports/archive
            git checkout origin/gh-pages -- archive/ 2>/dev/null || true
            cp -r archive/. reports/archive/ 2>/dev/null || true
            echo "✅ Archive included in Pages deployment"
          else
            echo "No gh-pages branch yet — skipping archive copy"
          fi

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./reports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Send email
        if: always()
        uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          to: ${{ secrets.MAIL_TO }}
          from: Crawl Reports <${{ secrets.MAIL_USERNAME }}>
          subject: "Broken Link Report — Ad-Hoc — Run #${{ github.run_number }} — ${{ job.status }}"
          convert_markdown: false
          body: |
            Broken Link Report — Ad-Hoc Scan

            Run #${{ github.run_number }} | Status: ${{ job.status }}
            URL: ${{ github.event.inputs.base_url }}
            Mode: ${{ github.event.inputs.scan_mode }}
            Label: ${{ github.event.inputs.scan_label || 'none' }}

            ── QUICK SUMMARY ──────────────────────────────
            The report table shows Broken, Redirect, Timeout and Error links.
            200 OK links are in the Excel/CSV exports only.
            ───────────────────────────────────────────────

            View Live Report:
            ${{ steps.deployment.outputs.page_url }}

            Browse Ad-Hoc Archive:
            https://arunkumarguddeti.github.io/Crawl-report/archive/adhoc/

            Download ZIP (HTML + CSV + Excel):
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Write job summary
        if: always()
        run: |
          echo "## 🔍 Ad-Hoc Crawl Complete" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ github.event.inputs.base_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Live report:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          ls -lh reports/ | awk 'NR>1 {print "| " $9 " | " $5 " |"}' >> $GITHUB_STEP_SUMMARY || true
