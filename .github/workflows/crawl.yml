name: Broken Link Crawler

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Website base URL (used for full crawl and domain matching)'
        required: true
        default: 'https://www.example.com'

      scan_mode:
        description: 'Scan mode'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - targeted

      target_pages:
        description: |
          [TARGETED MODE ONLY] Comma-separated page URLs to scan.
          Example: https://site.com/about,https://site.com/contact,https://site.com/services
        required: false
        default: ''

      scan_label:
        description: |
          Optional label to identify this run (e.g. "Homepage fix" or "Sprint-42 audit").
          Shown in the report header and included in the artifact filename.
        required: false
        default: ''

      max_depth:
        description: '[FULL MODE] Max crawl depth'
        required: false
        default: '8'

      max_pages:
        description: '[FULL MODE] Hard cap on pages to crawl'
        required: false
        default: '3000'

      concurrency:
        description: 'Parallel workers (default: 10)'
        required: false
        default: '10'

  schedule:
    - cron: '0 9 * * *'   # Everyday 6:00 AM EST (9:00 UTC)
    - cron: '0 23 * * *' # Everyday 8:00 PM EST (23:00 UTC)

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  crawl:
    name: Run Crawler (${{ github.event.inputs.scan_mode || 'scheduled-full' }})
    runs-on: ubuntu-latest
    timeout-minutes: 360
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── Validate targeted mode has pages supplied ──────────────
      - name: Validate inputs
        run: |
          MODE="${{ github.event.inputs.scan_mode }}"
          PAGES="${{ github.event.inputs.target_pages }}"
          if [ "$MODE" = "targeted" ] && [ -z "$PAGES" ]; then
            echo "❌ ERROR: scan_mode is 'targeted' but target_pages is empty."
            echo "Please provide at least one URL in the target_pages field."
            exit 1
          fi
          echo "✅ Inputs valid. Mode: $MODE"

      - name: Run crawler
        env:
          BASE_URL:      ${{ github.event.inputs.base_url || 'https://www.example.com' }}
          # TARGET_PAGES is empty string for full mode — crawler ignores it
          TARGET_PAGES:  ${{ github.event.inputs.target_pages || '' }}
          SCAN_LABEL:    ${{ github.event.inputs.scan_label || '' }}
          MAX_DEPTH:     ${{ github.event.inputs.max_depth || '8' }}
          MAX_PAGES:     ${{ github.event.inputs.max_pages || '3000' }}
          CONCURRENCY:   ${{ github.event.inputs.concurrency || '10' }}
          TIMEOUT:       '10'
          POLITE_DELAY:  '0.3'
          RESPECT_ROBOTS: 'true'
          OUTPUT_DIR:    './reports'
        run: |
          python crawler.py

      - name: Verify reports folder
        run: |
          echo "=== Files in reports/ ==="
          ls -lh reports/
          test -f reports/index.html && echo "✅ index.html found" || echo "❌ index.html MISSING"

      # Artifact name includes the label so multiple same-day runs are distinct
      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        if: always()
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          name: report-${{ github.event.inputs.scan_mode || 'full' }}-${{ github.event.inputs.scan_label || github.run_number }}
          path: |
            reports/*.html
            reports/*.csv
            reports/*.xlsx
          retention-days: 30

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./reports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Write job summary
        if: always()
        run: |
          echo "## ✅ Scan Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Live report:** ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          ls -lh reports/ | awk 'NR>1 {print "| " $9 " | " $5 " |"}' >> $GITHUB_STEP_SUMMARY || true
