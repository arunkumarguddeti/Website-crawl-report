# ─────────────────────────────────────────────────────────────
#  crawl-all.yml — Run all 4 site crawls with one click.
#  Uses secrets stored in GitHub — no URLs needed in the form.
#  Each site workflow runs independently with its own BASE_URL.
# ─────────────────────────────────────────────────────────────
name: 🚀 Run All Sites Now

on:
  workflow_dispatch:
    inputs:
      scan_mode:
        description: 'Scan mode for all sites'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - targeted
      scan_label:
        description: 'Optional label applied to all runs (e.g. "Weekly audit")'
        required: false
        default: ''

permissions:
  actions: write   # needed to trigger other workflows via API
  contents: read

jobs:
  trigger-all:
    name: Trigger all site crawls
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check actor permission
        run: |
          if [ "${{ github.actor }}" != "${{ github.repository_owner }}" ]; then
            echo "❌ Unauthorized: only the repo owner can trigger this workflow."
            exit 1
          fi
          echo "✅ Authorized: ${{ github.actor }}"

      - name: Trigger Site 1
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/crawl-site1.yml/dispatches \
            -d '{
              "ref": "main",
              "inputs": {
                "scan_mode": "${{ github.event.inputs.scan_mode }}",
                "target_pages": "",
                "scan_label": "${{ github.event.inputs.scan_label }}"
              }
            }'
          echo "✅ Site 1 triggered"

      - name: Wait 30 seconds before Site 2
        run: sleep 30

      - name: Trigger Site 2
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/crawl-site2.yml/dispatches \
            -d '{
              "ref": "main",
              "inputs": {
                "scan_mode": "${{ github.event.inputs.scan_mode }}",
                "target_pages": "",
                "scan_label": "${{ github.event.inputs.scan_label }}"
              }
            }'
          echo "✅ Site 2 triggered"

      - name: Wait 30 seconds before Site 3
        run: sleep 30

      - name: Trigger Site 3
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/crawl-site3.yml/dispatches \
            -d '{
              "ref": "main",
              "inputs": {
                "scan_mode": "${{ github.event.inputs.scan_mode }}",
                "target_pages": "",
                "scan_label": "${{ github.event.inputs.scan_label }}"
              }
            }'
          echo "✅ Site 3 triggered"

      - name: Wait 30 seconds before Site 4
        run: sleep 30

      - name: Trigger Site 4
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/crawl-site4.yml/dispatches \
            -d '{
              "ref": "main",
              "inputs": {
                "scan_mode": "${{ github.event.inputs.scan_mode }}",
                "target_pages": "",
                "scan_label": "${{ github.event.inputs.scan_label }}"
              }
            }'
          echo "✅ Site 4 triggered"

      - name: Summary
        run: |
          echo "## 🚀 All 4 crawls triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Site | Workflow | Mode |" >> $GITHUB_STEP_SUMMARY
          echo "|------|----------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Site 1 | crawl.yml | ${{ github.event.inputs.scan_mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Site 2 | crawl-site2.yml | ${{ github.event.inputs.scan_mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Site 3 | crawl-site3.yml | ${{ github.event.inputs.scan_mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Site 4 | crawl-site4.yml | ${{ github.event.inputs.scan_mode }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the **Actions tab** to monitor each crawl individually." >> $GITHUB_STEP_SUMMARY
